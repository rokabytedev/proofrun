# proofrun config — React Native CLI preset
# Generated by: proofrun init --preset react-native-cli
# Review and fill in project-specific values marked with TODO.

platform: ios

app:
  bundle_id: ""        # TODO: Set your iOS bundle ID (from ios/*.xcodeproj or Podfile)
  display_name: ""     # TODO: Set your app display name

dev_server:
  start: "npx react-native start --port {{port}}"
  ready_signal: "Ready"
  health_check: "curl -s http://localhost:{{port}}"
  startup_timeout: 120

simulator:
  pool_size: 5
  device_types:
    default: "iPhone 16 Pro"
    narrow: "iPhone SE (3rd generation)"
    wide: "iPhone 16 Pro Max"
    tablet: "iPad Pro 13-inch (M4)"

port_range:
  start: 8090
  end: 8099

interaction:
  tool: iosef
  tool_check: "iosef --help"
  tool_install_hint: "npx skills add riwsky/iosef@ios-simulator-interaction -g"
  element_strategy: identifier
  testid_attribute: testID

change_context:
  source: manual

app_knowledge:
  source: none

boundaries:
  path: ".proofrun/boundaries.md"

reports:
  output_dir: ".proofrun/reports"
  embed_screenshots: true
  open_after_generate: false

session:
  lock_dir: ".proofrun/locks"
  evidence_dir: ".proofrun/sessions"
  max_retries_per_ac: 2
