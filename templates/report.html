<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proofrun Verification Report</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --blue: #58a6ff;
    --purple: #bc8cff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 24px;
    max-width: 960px;
    margin: 0 auto;
  }
  h1 { font-size: 24px; margin-bottom: 4px; }
  h2 { font-size: 18px; margin-bottom: 12px; color: var(--text); }
  h3 { font-size: 15px; margin-bottom: 8px; }
  .meta { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
  .summary {
    display: flex; gap: 16px; flex-wrap: wrap;
    margin-bottom: 32px; padding: 16px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  }
  .stat {
    display: flex; flex-direction: column; align-items: center;
    padding: 8px 16px; min-width: 80px;
  }
  .stat-value { font-size: 28px; font-weight: 700; }
  .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; }
  .stat-pass .stat-value { color: var(--green); }
  .stat-fail .stat-value { color: var(--red); }
  .stat-human .stat-value { color: var(--yellow); }
  .stat-total .stat-value { color: var(--blue); }
  .ac-section {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: 16px; overflow: hidden;
  }
  .ac-header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px; cursor: pointer; user-select: none;
  }
  .ac-header:hover { background: rgba(255,255,255,0.03); }
  .badge {
    display: inline-block; padding: 2px 10px; border-radius: 12px;
    font-size: 12px; font-weight: 600; text-transform: uppercase; white-space: nowrap;
  }
  .badge-pass { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge-fail { background: rgba(248,81,73,0.15); color: var(--red); }
  .badge-human_required { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .badge-pending { background: rgba(139,148,158,0.15); color: var(--text-muted); }
  .badge-carried { background: rgba(139,148,158,0.15); color: var(--text-muted); }
  .badge-re-verified { background: rgba(88,166,255,0.15); color: var(--blue); }
  .badge-new { background: rgba(188,140,255,0.15); color: var(--purple); }
  .ac-title { flex: 1; font-weight: 600; }
  .ac-body { padding: 0 16px 16px; display: none; }
  .ac-body.open { display: block; }
  .reasoning {
    padding: 12px; margin-bottom: 12px;
    background: var(--bg); border-radius: 6px; border-left: 3px solid var(--blue);
    font-size: 14px;
  }
  .timeline { margin-bottom: 16px; }
  .timeline-entry {
    display: flex; gap: 8px; padding: 6px 0;
    font-size: 13px; border-bottom: 1px solid var(--border);
  }
  .timeline-entry:last-child { border-bottom: none; }
  .timeline-type {
    font-weight: 600; min-width: 80px; text-transform: uppercase; font-size: 11px;
    padding-top: 2px;
  }
  .type-step { color: var(--blue); }
  .type-screenshot { color: var(--purple); }
  .type-judgment { color: var(--green); }
  .type-fix { color: var(--yellow); }
  .type-note { color: var(--text-muted); }
  .type-carry { color: var(--text-muted); }
  .timeline-content { flex: 1; }
  .timeline-time { color: var(--text-muted); font-size: 11px; white-space: nowrap; }
  .screenshots { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .screenshot-thumb {
    width: 200px; border-radius: 6px; border: 1px solid var(--border);
    cursor: pointer; transition: transform 0.15s;
  }
  .screenshot-thumb:hover { transform: scale(1.02); }
  .screenshot-note { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .feedback-controls {
    display: flex; align-items: center; gap: 8px; padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .btn {
    padding: 6px 16px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); cursor: pointer; font-size: 13px;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--text-muted); }
  .btn-accept.active { background: rgba(63,185,80,0.15); border-color: var(--green); color: var(--green); }
  .btn-reject.active { background: rgba(248,81,73,0.15); border-color: var(--red); color: var(--red); }
  .comment-area {
    width: 100%; margin-top: 8px; padding: 8px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text);
    font-family: inherit; font-size: 13px; resize: vertical; min-height: 60px;
  }
  .top-level-comment {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; margin-bottom: 24px;
  }
  .top-level-comment h3 { margin-bottom: 8px; }
  .top-level-comment textarea {
    width: 100%; padding: 10px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text);
    font-family: inherit; font-size: 14px; resize: vertical; min-height: 80px;
  }
  .action-bar {
    display: flex; justify-content: flex-end; margin-bottom: 24px; gap: 12px;
    align-items: center;
  }
  .btn-action {
    padding: 10px 24px; border-radius: 6px; border: none;
    cursor: pointer; font-weight: 600; font-size: 14px;
    transition: all 0.15s;
  }
  .btn-action:hover { opacity: 0.9; }
  .btn-action:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-submit {
    background: var(--blue); color: var(--bg);
  }
  .btn-lgtm {
    background: var(--green); color: var(--bg);
  }
  .btn-export {
    padding: 8px 20px; border-radius: 6px; border: none;
    background: var(--blue); color: var(--bg); cursor: pointer;
    font-weight: 600; font-size: 14px;
  }
  .btn-export:hover { opacity: 0.9; }
  .confirmation-msg {
    color: var(--green); font-size: 14px; font-weight: 600;
    display: none;
  }
  .confirmation-msg.visible { display: inline; }
  /* Run tabs */
  .run-tabs {
    display: flex; gap: 4px; margin-bottom: 24px;
    border-bottom: 2px solid var(--border); padding-bottom: 0;
  }
  .run-tab {
    padding: 8px 16px; cursor: pointer; font-size: 14px;
    color: var(--text-muted); border-bottom: 2px solid transparent;
    margin-bottom: -2px; transition: all 0.15s; user-select: none;
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: inherit;
  }
  .run-tab:hover { color: var(--text); }
  .run-tab.active { color: var(--text); border-bottom-color: var(--blue); font-weight: 600; }
  /* Lightbox */
  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.9); align-items: center; justify-content: center;
    cursor: zoom-out;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 95vw; max-height: 95vh; border-radius: 8px; }
  .general-notes {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; margin-bottom: 16px;
  }
  .general-notes h3 { margin-bottom: 8px; }
  .command-text { font-family: monospace; font-size: 12px; color: var(--text-muted); }
  .prereq-section {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; margin-bottom: 24px;
  }
  .prereq-section h2 { margin-bottom: 12px; }
  .prereq-item {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px;
  }
  .prereq-item:last-child { border-bottom: none; }
  .prereq-desc { flex: 1; }
  .prereq-check { font-family: monospace; font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .prereq-output { font-family: monospace; font-size: 11px; color: var(--text-muted); margin-top: 2px; white-space: pre-wrap; max-height: 80px; overflow: auto; }
  .prereq-time { color: var(--text-muted); font-size: 12px; white-space: nowrap; }
  .prereq-warning { color: var(--yellow); font-size: 14px; padding: 8px 0; }
  .carry-info { font-size: 12px; color: var(--text-muted); margin-left: 8px; }
</style>
</head>
<body>
<script>
const REPORT_DATA = /*__REPORT_DATA__*/null;
</script>

<h1>Proofrun Verification Report</h1>
<div class="meta" id="meta"></div>

<div id="run-tabs-container"></div>

<div class="summary" id="summary"></div>

<div class="action-bar" id="action-bar"></div>

<div id="top-level-comment-container"></div>
<div id="prerequisites"></div>
<div id="ac-list"></div>
<div id="general-notes"></div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="Screenshot">
</div>

<script>
const isServeMode = typeof SERVE_MODE !== 'undefined' && SERVE_MODE === true;
let currentRunIndex = 0;
let feedbackState = {};
let topLevelComment = '';
let submitted = false;

function getCurrentRun() {
  const d = REPORT_DATA;
  if (d.runs && d.runs.length > 0) return d.runs[currentRunIndex];
  // Legacy single-run fallback
  return {
    run_number: 1,
    session_id: d.session_id,
    reason: null,
    started_at: d.started_at,
    device: d.device,
    criteria: d.criteria,
    prerequisites: d.prerequisites,
    general_entries: d.general_entries,
    summary: d.summary,
  };
}

function getRunCount() {
  return REPORT_DATA.runs ? REPORT_DATA.runs.length : 1;
}

function init() {
  const d = REPORT_DATA;
  if (d.runs && d.runs.length > 0) {
    currentRunIndex = d.runs.length - 1; // latest run selected by default
  }
  feedbackState = loadFeedbackState();
  topLevelComment = loadTopLevelComment();
  render();
}

function render() {
  const d = REPORT_DATA;
  const run = getCurrentRun();

  document.getElementById('meta').innerHTML =
    `Change: <strong>${esc(d.change_name)}</strong> &middot; ` +
    `${run.started_at?.slice(0,10) || ''} &middot; ` +
    `${esc(typeof run.device === 'string' ? run.device : (run.device?.device_name || ''))}`;

  // Render run tabs (only if multiple runs)
  const tabsContainer = document.getElementById('run-tabs-container');
  if (getRunCount() > 1) {
    tabsContainer.innerHTML = '<div class="run-tabs">' +
      d.runs.map((r, i) => {
        const label = r.reason ? `Run #${r.run_number}: ${esc(r.reason)}` : `Run #${r.run_number} (Initial)`;
        return `<button class="run-tab ${i === currentRunIndex ? 'active' : ''}" onclick="switchRun(${i})">${label}</button>`;
      }).join('') + '</div>';
  } else {
    tabsContainer.innerHTML = '';
  }

  const s = run.summary;
  document.getElementById('summary').innerHTML = [
    stat(s.total_criteria, 'Criteria', 'total'),
    stat(s.pass, 'Passed', 'pass'),
    stat(s.fail, 'Failed', 'fail'),
    stat(s.human_required, 'Human', 'human'),
    stat(s.total_steps, 'Steps', 'total'),
    stat(s.total_screenshots, 'Screenshots', 'total'),
    stat(s.total_fixes, 'Fixes', 'total'),
  ].join('');

  // Render action bar
  renderActionBar();

  // Render top-level comment (only for latest run)
  const commentContainer = document.getElementById('top-level-comment-container');
  if (currentRunIndex === getRunCount() - 1) {
    commentContainer.innerHTML = `<div class="top-level-comment">
      <h3>Reviewer Comment</h3>
      <textarea placeholder="General comments about this verification run..."
        oninput="updateTopLevelComment(this.value)"
        ${submitted ? 'disabled' : ''}>${esc(topLevelComment)}</textarea>
    </div>`;
  } else {
    commentContainer.innerHTML = '';
  }

  // Render prerequisites section
  const prereqEl = document.getElementById('prerequisites');
  if (run.prerequisites && run.prerequisites.length > 0) {
    prereqEl.innerHTML = `<div class="prereq-section"><h2>Prerequisites</h2>` +
      run.prerequisites.map(p => {
        let html = `<div class="prereq-item">`;
        html += `<div class="prereq-desc">${esc(p.description)}`;
        if (p.check_command) {
          html += `<div class="prereq-check">$ ${esc(p.check_command)}</div>`;
          if (p.check_output) html += `<div class="prereq-output">${esc(p.check_output)}</div>`;
        }
        html += `</div>`;
        if (p.check_passed === true) html += `<span class="badge badge-pass">Passed</span>`;
        else if (p.check_passed === false) html += `<span class="badge badge-fail">Failed</span>`;
        html += `<span class="prereq-time">${fmtTime(p.timestamp)}</span>`;
        html += `</div>`;
        return html;
      }).join('') + `</div>`;
  } else {
    prereqEl.innerHTML = `<div class="prereq-section"><h2>Prerequisites</h2><div class="prereq-warning">No environment prerequisites were recorded for this session.</div></div>`;
  }

  const acList = document.getElementById('ac-list');
  acList.innerHTML = run.criteria.map(c => renderCriterion(c)).join('');

  if (run.general_entries?.length > 0) {
    document.getElementById('general-notes').innerHTML =
      `<div class="general-notes"><h3>General Notes</h3>` +
      run.general_entries.map(e =>
        `<div class="timeline-entry"><span class="timeline-type type-${e.type}">${e.type}</span>` +
        `<span class="timeline-content">${esc(e.text || e.description || '')}</span>` +
        `<span class="timeline-time">${fmtTime(e.timestamp)}</span></div>`
      ).join('') + '</div>';
  } else {
    document.getElementById('general-notes').innerHTML = '';
  }
}

function renderActionBar() {
  const bar = document.getElementById('action-bar');
  const isLatestRun = currentRunIndex === getRunCount() - 1;

  if (submitted) {
    bar.innerHTML = '<span class="confirmation-msg visible" id="confirm-msg">Feedback submitted. Agent has been notified.</span>';
    return;
  }

  if (isServeMode && isLatestRun) {
    const hasRejections = checkForRejections();
    bar.innerHTML =
      `<span class="confirmation-msg" id="confirm-msg"></span>` +
      `<button class="btn-action btn-submit" id="btn-submit" onclick="submitFeedback()">Submit Feedback</button>` +
      `<button class="btn-action btn-lgtm" id="btn-lgtm" onclick="submitLgtm()"` +
      `${hasRejections ? ' disabled title="Resolve rejections or submit feedback with comments"' : ''}>LGTM</button>`;
  } else if (!isServeMode) {
    // Static mode: show export button
    bar.innerHTML = `<button class="btn-export" onclick="exportFeedback()">Export Feedback</button>`;
  } else {
    bar.innerHTML = '';
  }
}

function switchRun(index) {
  currentRunIndex = index;
  render();
}

function stat(val, label, cls) {
  return `<div class="stat stat-${cls}"><span class="stat-value">${val}</span><span class="stat-label">${label}</span></div>`;
}

function renderCriterion(c) {
  const fb = feedbackState[c.criterion] || {};
  const lastJ = c.judgments[c.judgments.length - 1];
  const reasoning = lastJ?.reasoning || '';
  const allEntries = [...c.steps, ...c.screenshots, ...c.judgments, ...c.fixes, ...(c.notes || []), ...(c.carries || [])]
    .sort((a, b) => (a.id || 0) - (b.id || 0));

  // Classification badge
  let classificationBadge = '';
  if (c.classification === 'carried' && c.carry_info) {
    classificationBadge = `<span class="badge badge-carried">Carried from Run #${c.carry_info.from_run}</span>` +
      `<span class="carry-info">${esc(c.carry_info.reason)}</span>`;
    // If carried with approval, show that
    if (c.carried_approval === 'accepted') {
      classificationBadge += `<span class="badge badge-pass" style="margin-left:4px">Auto-approved</span>`;
    }
  } else if (c.classification === 're-verified') {
    classificationBadge = `<span class="badge badge-re-verified">Re-verified</span>`;
  } else if (c.classification === 'new') {
    classificationBadge = `<span class="badge badge-new">New</span>`;
  }

  // Pre-select carried approval status
  const isLatestRun = currentRunIndex === getRunCount() - 1;
  if (isLatestRun && c.carried_approval === 'accepted' && !fb.status) {
    feedbackState[c.criterion] = feedbackState[c.criterion] || {};
    feedbackState[c.criterion].status = 'accepted';
    saveFeedbackState();
  }
  const currentFb = feedbackState[c.criterion] || {};
  const isDisabled = submitted ? 'disabled' : '';

  return `
  <div class="ac-section" data-criterion="${esc(c.criterion)}">
    <div class="ac-header" onclick="toggleAC(this)">
      <span class="badge badge-${c.latest_status}">${statusLabel(c.latest_status)}</span>
      ${classificationBadge}
      <span class="ac-title">${esc(c.criterion)}</span>
      <span style="color:var(--text-muted);font-size:13px">${c.screenshots.length} img, ${c.steps.length} steps</span>
    </div>
    <div class="ac-body">
      ${reasoning ? `<div class="reasoning">${esc(reasoning)}</div>` : ''}
      ${c.screenshots.length > 0 ? `<div class="screenshots">${c.screenshots.map(s =>
        `<div><img class="screenshot-thumb" src="${s.data_uri || ''}" alt="${esc(c.criterion)} screenshot" onclick="openLightbox(this.src)">` +
        (s.note ? `<div class="screenshot-note">${esc(s.note)}</div>` : '') + '</div>'
      ).join('')}</div>` : ''}
      <div class="timeline"><h3>Timeline</h3>${allEntries.map(e => renderTimelineEntry(e)).join('')}</div>
      ${isLatestRun ? `<div class="feedback-controls">
        <button class="btn btn-accept ${currentFb.status === 'accepted' ? 'active' : ''}" ${isDisabled}
          onclick="setFeedback('${esc(c.criterion)}', 'accepted', this)">Accept</button>
        <button class="btn btn-reject ${currentFb.status === 'rejected' ? 'active' : ''}" ${isDisabled}
          onclick="setFeedback('${esc(c.criterion)}', 'rejected', this)">Reject</button>
      </div>
      <textarea class="comment-area" placeholder="Comments..." ${isDisabled}
        onchange="setComment('${esc(c.criterion)}', this.value)">${esc(currentFb.comment || '')}</textarea>` : ''}
    </div>
  </div>`;
}

function renderTimelineEntry(e) {
  let content = '';
  if (e.type === 'step') content = esc(e.description || '') + (e.command ? ` <span class="command-text">${esc(e.command)}</span>` : '');
  else if (e.type === 'judgment') content = `<span class="badge badge-${e.status}">${statusLabel(e.status)}</span> ${esc(e.reasoning || '')}`;
  else if (e.type === 'screenshot') content = `Screenshot` + (e.note ? `: ${esc(e.note)}` : '');
  else if (e.type === 'fix') content = esc(e.description || '');
  else if (e.type === 'note') content = esc(e.text || '');
  else if (e.type === 'carry') content = `Carried from Run #${e.carried_from_run}: ${esc(e.reason || '')}`;
  return `<div class="timeline-entry"><span class="timeline-type type-${e.type}">${e.type}</span>` +
    `<span class="timeline-content">${content}</span>` +
    `<span class="timeline-time">${fmtTime(e.timestamp)}</span></div>`;
}

function statusLabel(s) {
  return { pass: 'Passed', fail: 'Failed', human_required: 'Human', pending: 'Pending' }[s] || s;
}

function toggleAC(header) {
  header.nextElementSibling.classList.toggle('open');
}

function openLightbox(src) {
  event.stopPropagation();
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

function setFeedback(ac, status, btn) {
  if (submitted) return;
  if (!feedbackState[ac]) feedbackState[ac] = {};
  feedbackState[ac].status = feedbackState[ac].status === status ? null : status;
  saveFeedbackState();
  // Update button visual
  const section = btn.closest('.ac-section');
  section.querySelectorAll('.btn-accept, .btn-reject').forEach(b => b.classList.remove('active'));
  if (feedbackState[ac].status) btn.classList.add('active');
  updateButtonStates();
}

function setComment(ac, text) {
  if (submitted) return;
  if (!feedbackState[ac]) feedbackState[ac] = {};
  feedbackState[ac].comment = text;
  saveFeedbackState();
  updateButtonStates();
}

function updateTopLevelComment(text) {
  topLevelComment = text;
  saveTopLevelComment();
}

function checkForRejections() {
  const run = getCurrentRun();
  for (const c of run.criteria) {
    const fb = feedbackState[c.criterion];
    if (fb && fb.status === 'rejected') return true;
    if (fb && fb.comment && fb.comment.trim() && fb.status !== 'accepted') return true;
  }
  return false;
}

function updateButtonStates() {
  if (!isServeMode) return;
  const lgtmBtn = document.getElementById('btn-lgtm');
  if (!lgtmBtn) return;
  const hasRejections = checkForRejections();
  lgtmBtn.disabled = hasRejections;
  if (hasRejections) {
    lgtmBtn.title = 'Resolve rejections or submit feedback with comments';
  } else {
    lgtmBtn.title = '';
  }
}

function buildFeedbackPayload(lgtm) {
  const d = REPORT_DATA;
  const run = getCurrentRun();
  const criteria = run.criteria.map(c => {
    const fb = feedbackState[c.criterion] || {};
    return {
      criterion: c.criterion,
      source: c.classification || null,
      review_status: lgtm ? 'accepted' : (fb.status || 'pending'),
      comment: lgtm ? null : (fb.comment || null),
    };
  });

  const accepted = criteria.filter(c => c.review_status === 'accepted').length;
  const rejected = criteria.filter(c => c.review_status === 'rejected').length;
  const pending = criteria.filter(c => c.review_status === 'pending').length;

  return {
    session_id: run.session_id,
    run_number: run.run_number,
    change_name: d.change_name,
    reviewed_at: new Date().toISOString(),
    top_level_comment: lgtm ? null : (topLevelComment || null),
    lgtm: lgtm,
    criteria,
    summary: { accepted, rejected, pending },
  };
}

async function submitFeedback() {
  if (submitted) return;
  const payload = buildFeedbackPayload(false);
  try {
    const res = await fetch('/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (res.ok) {
      submitted = true;
      renderActionBar();
      disableAllInputs();
    }
  } catch (e) {
    console.error('Failed to submit feedback:', e);
  }
}

async function submitLgtm() {
  if (submitted) return;
  const payload = buildFeedbackPayload(true);
  try {
    const res = await fetch('/lgtm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (res.ok) {
      submitted = true;
      renderActionBar();
      disableAllInputs();
    }
  } catch (e) {
    console.error('Failed to submit LGTM:', e);
  }
}

function disableAllInputs() {
  document.querySelectorAll('.btn-accept, .btn-reject').forEach(b => b.disabled = true);
  document.querySelectorAll('.comment-area').forEach(t => t.disabled = true);
  const tlc = document.querySelector('.top-level-comment textarea');
  if (tlc) tlc.disabled = true;
}

function loadFeedbackState() {
  try {
    const run = REPORT_DATA.runs ? REPORT_DATA.runs[REPORT_DATA.runs.length - 1] : REPORT_DATA;
    const key = `proofrun-feedback-${run.session_id}`;
    return JSON.parse(localStorage.getItem(key) || '{}');
  } catch { return {}; }
}

function saveFeedbackState() {
  try {
    const run = REPORT_DATA.runs ? REPORT_DATA.runs[REPORT_DATA.runs.length - 1] : REPORT_DATA;
    const key = `proofrun-feedback-${run.session_id}`;
    localStorage.setItem(key, JSON.stringify(feedbackState));
  } catch {}
}

function loadTopLevelComment() {
  try {
    const run = REPORT_DATA.runs ? REPORT_DATA.runs[REPORT_DATA.runs.length - 1] : REPORT_DATA;
    const key = `proofrun-tlc-${run.session_id}`;
    return localStorage.getItem(key) || '';
  } catch { return ''; }
}

function saveTopLevelComment() {
  try {
    const run = REPORT_DATA.runs ? REPORT_DATA.runs[REPORT_DATA.runs.length - 1] : REPORT_DATA;
    const key = `proofrun-tlc-${run.session_id}`;
    localStorage.setItem(key, topLevelComment);
  } catch {}
}

function exportFeedback() {
  const payload = buildFeedbackPayload(false);
  const d = REPORT_DATA;
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `feedback-${d.change_name}-${payload.session_id}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtTime(t) { return t ? new Date(t).toLocaleTimeString() : ''; }

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
init();
</script>
</body>
</html>
