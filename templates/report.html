<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proofrun Verification Report</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --blue: #58a6ff;
    --purple: #bc8cff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 24px;
    max-width: 960px;
    margin: 0 auto;
  }
  h1 { font-size: 24px; margin-bottom: 4px; }
  h2 { font-size: 18px; margin-bottom: 12px; color: var(--text); }
  h3 { font-size: 15px; margin-bottom: 8px; }
  .meta { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
  .summary {
    display: flex; gap: 16px; flex-wrap: wrap;
    margin-bottom: 32px; padding: 16px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  }
  .stat {
    display: flex; flex-direction: column; align-items: center;
    padding: 8px 16px; min-width: 80px;
  }
  .stat-value { font-size: 28px; font-weight: 700; }
  .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; }
  .stat-pass .stat-value { color: var(--green); }
  .stat-fail .stat-value { color: var(--red); }
  .stat-human .stat-value { color: var(--yellow); }
  .stat-total .stat-value { color: var(--blue); }
  .ac-section {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: 16px; overflow: hidden;
  }
  .ac-header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px; cursor: pointer; user-select: none;
  }
  .ac-header:hover { background: rgba(255,255,255,0.03); }
  .badge {
    display: inline-block; padding: 2px 10px; border-radius: 12px;
    font-size: 12px; font-weight: 600; text-transform: uppercase; white-space: nowrap;
  }
  .badge-pass { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge-fail { background: rgba(248,81,73,0.15); color: var(--red); }
  .badge-human_required { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .badge-pending { background: rgba(139,148,158,0.15); color: var(--text-muted); }
  .ac-title { flex: 1; font-weight: 600; }
  .ac-body { padding: 0 16px 16px; display: none; }
  .ac-body.open { display: block; }
  .reasoning {
    padding: 12px; margin-bottom: 12px;
    background: var(--bg); border-radius: 6px; border-left: 3px solid var(--blue);
    font-size: 14px;
  }
  .timeline { margin-bottom: 16px; }
  .timeline-entry {
    display: flex; gap: 8px; padding: 6px 0;
    font-size: 13px; border-bottom: 1px solid var(--border);
  }
  .timeline-entry:last-child { border-bottom: none; }
  .timeline-type {
    font-weight: 600; min-width: 80px; text-transform: uppercase; font-size: 11px;
    padding-top: 2px;
  }
  .type-step { color: var(--blue); }
  .type-screenshot { color: var(--purple); }
  .type-judgment { color: var(--green); }
  .type-fix { color: var(--yellow); }
  .type-note { color: var(--text-muted); }
  .timeline-content { flex: 1; }
  .timeline-time { color: var(--text-muted); font-size: 11px; white-space: nowrap; }
  .screenshots { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .screenshot-thumb {
    width: 200px; border-radius: 6px; border: 1px solid var(--border);
    cursor: pointer; transition: transform 0.15s;
  }
  .screenshot-thumb:hover { transform: scale(1.02); }
  .screenshot-note { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .feedback-controls {
    display: flex; align-items: center; gap: 8px; padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .btn {
    padding: 6px 16px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); cursor: pointer; font-size: 13px;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--text-muted); }
  .btn-accept.active { background: rgba(63,185,80,0.15); border-color: var(--green); color: var(--green); }
  .btn-reject.active { background: rgba(248,81,73,0.15); border-color: var(--red); color: var(--red); }
  .comment-area {
    width: 100%; margin-top: 8px; padding: 8px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text);
    font-family: inherit; font-size: 13px; resize: vertical; min-height: 60px;
  }
  .export-bar {
    display: flex; justify-content: flex-end; margin-bottom: 24px; gap: 8px;
  }
  .btn-export {
    padding: 8px 20px; border-radius: 6px; border: none;
    background: var(--blue); color: var(--bg); cursor: pointer;
    font-weight: 600; font-size: 14px;
  }
  .btn-export:hover { opacity: 0.9; }
  /* Lightbox */
  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.9); align-items: center; justify-content: center;
    cursor: zoom-out;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 95vw; max-height: 95vh; border-radius: 8px; }
  .general-notes {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; margin-bottom: 16px;
  }
  .general-notes h3 { margin-bottom: 8px; }
  .command-text { font-family: monospace; font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>
<script>
const REPORT_DATA = /*__REPORT_DATA__*/null;
</script>

<h1>Proofrun Verification Report</h1>
<div class="meta" id="meta"></div>

<div class="summary" id="summary"></div>

<div class="export-bar">
  <button class="btn-export" onclick="exportFeedback()">Export Feedback</button>
</div>

<div id="ac-list"></div>
<div id="general-notes"></div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="Screenshot">
</div>

<script>
const feedbackState = loadFeedbackState();

function render() {
  const d = REPORT_DATA;
  document.getElementById('meta').innerHTML =
    `Change: <strong>${esc(d.change_name)}</strong> &middot; ${d.started_at?.slice(0,10) || ''} &middot; ${esc(typeof d.device === 'string' ? d.device : (d.device?.device_name || ''))}`;

  const s = d.summary;
  document.getElementById('summary').innerHTML = [
    stat(s.total_criteria, 'Criteria', 'total'),
    stat(s.pass, 'Passed', 'pass'),
    stat(s.fail, 'Failed', 'fail'),
    stat(s.human_required, 'Human', 'human'),
    stat(s.total_steps, 'Steps', 'total'),
    stat(s.total_screenshots, 'Screenshots', 'total'),
    stat(s.total_fixes, 'Fixes', 'total'),
  ].join('');

  const acList = document.getElementById('ac-list');
  acList.innerHTML = d.criteria.map(c => renderCriterion(c)).join('');

  if (d.general_entries?.length > 0) {
    document.getElementById('general-notes').innerHTML =
      `<div class="general-notes"><h3>General Notes</h3>` +
      d.general_entries.map(e =>
        `<div class="timeline-entry"><span class="timeline-type type-${e.type}">${e.type}</span>` +
        `<span class="timeline-content">${esc(e.text || e.description || '')}</span>` +
        `<span class="timeline-time">${fmtTime(e.timestamp)}</span></div>`
      ).join('') + '</div>';
  }
}

function stat(val, label, cls) {
  return `<div class="stat stat-${cls}"><span class="stat-value">${val}</span><span class="stat-label">${label}</span></div>`;
}

function renderCriterion(c) {
  const fb = feedbackState[c.criterion] || {};
  const lastJ = c.judgments[c.judgments.length - 1];
  const reasoning = lastJ?.reasoning || '';
  const allEntries = [...c.steps, ...c.screenshots, ...c.judgments, ...c.fixes, ...(c.notes || [])]
    .sort((a, b) => (a.id || 0) - (b.id || 0));

  return `
  <div class="ac-section" data-criterion="${esc(c.criterion)}">
    <div class="ac-header" onclick="toggleAC(this)">
      <span class="badge badge-${c.latest_status}">${statusLabel(c.latest_status)}</span>
      <span class="ac-title">${esc(c.criterion)}</span>
      <span style="color:var(--text-muted);font-size:13px">${c.screenshots.length} img, ${c.steps.length} steps</span>
    </div>
    <div class="ac-body">
      ${reasoning ? `<div class="reasoning">${esc(reasoning)}</div>` : ''}
      ${c.screenshots.length > 0 ? `<div class="screenshots">${c.screenshots.map(s =>
        `<div><img class="screenshot-thumb" src="${s.data_uri || ''}" alt="${esc(c.criterion)} screenshot" onclick="openLightbox(this.src)">` +
        (s.note ? `<div class="screenshot-note">${esc(s.note)}</div>` : '') + '</div>'
      ).join('')}</div>` : ''}
      <div class="timeline"><h3>Timeline</h3>${allEntries.map(e => renderTimelineEntry(e)).join('')}</div>
      <div class="feedback-controls">
        <button class="btn btn-accept ${fb.status === 'accepted' ? 'active' : ''}"
          onclick="setFeedback('${esc(c.criterion)}', 'accepted', this)">Accept</button>
        <button class="btn btn-reject ${fb.status === 'rejected' ? 'active' : ''}"
          onclick="setFeedback('${esc(c.criterion)}', 'rejected', this)">Reject</button>
      </div>
      <textarea class="comment-area" placeholder="Comments..."
        onchange="setComment('${esc(c.criterion)}', this.value)">${esc(fb.comment || '')}</textarea>
    </div>
  </div>`;
}

function renderTimelineEntry(e) {
  let content = '';
  if (e.type === 'step') content = esc(e.description || '') + (e.command ? ` <span class="command-text">${esc(e.command)}</span>` : '');
  else if (e.type === 'judgment') content = `<span class="badge badge-${e.status}">${statusLabel(e.status)}</span> ${esc(e.reasoning || '')}`;
  else if (e.type === 'screenshot') content = `Screenshot` + (e.note ? `: ${esc(e.note)}` : '');
  else if (e.type === 'fix') content = esc(e.description || '');
  else if (e.type === 'note') content = esc(e.text || '');
  return `<div class="timeline-entry"><span class="timeline-type type-${e.type}">${e.type}</span>` +
    `<span class="timeline-content">${content}</span>` +
    `<span class="timeline-time">${fmtTime(e.timestamp)}</span></div>`;
}

function statusLabel(s) {
  return { pass: 'Passed', fail: 'Failed', human_required: 'Human', pending: 'Pending' }[s] || s;
}

function toggleAC(header) {
  header.nextElementSibling.classList.toggle('open');
}

function openLightbox(src) {
  event.stopPropagation();
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

function setFeedback(ac, status, btn) {
  if (!feedbackState[ac]) feedbackState[ac] = {};
  feedbackState[ac].status = feedbackState[ac].status === status ? null : status;
  saveFeedbackState();
  // Update button visual
  const section = btn.closest('.ac-section');
  section.querySelectorAll('.btn-accept, .btn-reject').forEach(b => b.classList.remove('active'));
  if (feedbackState[ac].status) btn.classList.add('active');
}

function setComment(ac, text) {
  if (!feedbackState[ac]) feedbackState[ac] = {};
  feedbackState[ac].comment = text;
  saveFeedbackState();
}

function loadFeedbackState() {
  try {
    const key = `proofrun-feedback-${REPORT_DATA.session_id}`;
    return JSON.parse(localStorage.getItem(key) || '{}');
  } catch { return {}; }
}

function saveFeedbackState() {
  try {
    const key = `proofrun-feedback-${REPORT_DATA.session_id}`;
    localStorage.setItem(key, JSON.stringify(feedbackState));
  } catch {}
}

function exportFeedback() {
  const d = REPORT_DATA;
  const feedback = {
    session_id: d.session_id,
    change_name: d.change_name,
    reviewed_at: new Date().toISOString(),
    criteria: d.criteria.map(c => ({
      criterion: c.criterion,
      agent_status: c.latest_status,
      review_status: feedbackState[c.criterion]?.status || 'pending',
      comment: feedbackState[c.criterion]?.comment || null,
    })),
    summary: {
      accepted: d.criteria.filter(c => feedbackState[c.criterion]?.status === 'accepted').length,
      rejected: d.criteria.filter(c => feedbackState[c.criterion]?.status === 'rejected').length,
      pending: d.criteria.filter(c => !feedbackState[c.criterion]?.status).length,
    },
  };
  const blob = new Blob([JSON.stringify(feedback, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `feedback-${d.change_name}-${d.session_id}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtTime(t) { return t ? new Date(t).toLocaleTimeString() : ''; }

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
render();
</script>
</body>
</html>
